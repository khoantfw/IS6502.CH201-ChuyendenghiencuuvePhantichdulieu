data_path: data/raw/WA_Fn-UseC_-HR-Employee-Attrition.csv
output_dir: outputs
primary_seed: 42
stability_seeds: [17, 73]
train_size: 0.60
validation_size: 0.20
test_size: 0.20
threshold:
  minimum: 0.05
  maximum: 0.95
  step: 0.01
counterfactuals:
  dice_total: 5
  retry_count: 1
  salary_increments: [0.00, 0.05, 0.10, 0.15, 0.20, 0.25, 0.30]
  salary_cap_percentile: 75
  minimum_salary_group_size: 10
  overtime_policy: allowed
sensitivity:
  threshold_offsets: [-0.10, -0.05, 0.00, 0.05, 0.10]
  salary_cap_percentiles: [60, 75, 90]
  overtime_policies: [allowed, locked]
run:
  run_shap: true
  run_dice: true
  run_stability: true
  run_sensitivity: true
  generate_figures: true

